<div id="particles-js"></div>

<script>
tsParticles.load("particles-js", {
  background: {
    color: "transparent"
  },
  particles: {
    number: { value: 30 },
    color: { value: "#FFFFFF" },
    shape: { type: "circle" },
    opacity: { value: 0.5 },
    size: { value: 3 },
    move: {
      enable: true,
      speed: 2
    }
  }
});
</script>

<script>
document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e) {
        e.preventDefault();

        const sound = new Audio("click.mp3");
        sound.play();

        setTimeout(() => {
            window.location.href = this.href;
        }, 150);
    });
});
</script>

<audio id="bgMusic" loop>
    <source src="lobby.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("bgMusic");

// Revisar si ya estaba sonando
if (!localStorage.getItem("musicPlaying")) {
    music.volume = 0.3;
    music.play().then(() => {
        localStorage.setItem("musicPlaying", "true");
    }).catch(() => {});
}
</script>

<iframe src="music.html" style="display:none;"></iframe>
